<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Control Practice</title>
    <link rel="stylesheet" href="styles.css?v=20260515" />
    <style>
      .entry-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 16px;
      }

      .entry-hero {
        width: min(960px, 100%);
        padding: clamp(24px, 5vw, 42px);
        border: 1px solid #d5dfd3;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 44px rgba(34, 48, 38, 0.12);
      }

      .entry-hero > p:not(.eyebrow) {
        max-width: 660px;
        margin-top: 12px;
        color: #607066;
        font-size: 18px;
        line-height: 1.45;
      }

      .entry-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 28px;
      }

      .entry-card {
        min-height: 220px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 16px;
        padding: 24px;
        border: 1px solid #d5dfd3;
        border-radius: 8px;
        color: #1c2520;
        background: linear-gradient(90deg, rgba(36, 107, 155, 0.12), transparent 42%), #fff;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(34, 48, 38, 0.08);
      }

      .entry-card.accent {
        background: linear-gradient(90deg, rgba(207, 77, 56, 0.12), transparent 42%), #fff;
      }

      .entry-card span {
        width: max-content;
        padding: 6px 10px;
        border-radius: 999px;
        color: #fff;
        background: #1d7a52;
        font-weight: 900;
      }

      .entry-card.accent span {
        background: #cf4d38;
      }

      .entry-card strong {
        display: block;
        font-size: clamp(32px, 5vw, 54px);
        line-height: 1;
      }

      .entry-card small {
        color: #607066;
        font-size: 16px;
        font-weight: 800;
      }

      @media (max-width: 760px) {
        .entry-actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="entry-page">
      <section class="entry-hero" aria-label="Выбор контрольной работы">
        <p class="eyebrow">Контрольная работа по английскому</p>
        <h1>Выберите раздел</h1>
        <p>КР-2 для терминов, переводов и аббревиатур. КР-3 для вопросов и устных ответов.</p>
        <div class="entry-actions">
          <a class="entry-card" href="kr2.html">
            <span>КР-2</span>
            <strong>Термины</strong>
            <small>Тренировки, справочник, озвучка</small>
          </a>
          <a class="entry-card accent" href="kr_3/answers.html">
            <span>КР-3</span>
            <strong>Вопросы</strong>
            <small>Ответы и тренировка устной части</small>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
